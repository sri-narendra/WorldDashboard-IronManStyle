<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD DASHBOARD // J.A.R.V.I.S.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e17;
  --bg-surface: #0d1321;
  --bg-card: rgba(13, 22, 40, 0.85);
  --bg-card-hover: rgba(16, 30, 55, 0.9);
  --cyan: #00d4ff;
  --cyan-dim: rgba(0, 212, 255, 0.3);
  --cyan-glow: rgba(0, 212, 255, 0.08);
  --amber: #ffb347;
  --coral: #ff4466;
  --green: #00ff88;
  --purple: #7c5cff;
  --text-primary: #e8f0ff;
  --text-secondary: #8899bb;
  --text-muted: #3a5068;
  --border-card: rgba(0, 212, 255, 0.12);
  --border-card-hover: rgba(0, 212, 255, 0.3);
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { background: var(--bg-deep); }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow-y: auto;
  min-height: 100dvh;
  position: relative;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#scanlines {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 212, 255, 0.015) 2px,
    rgba(0, 212, 255, 0.015) 4px
  );
}

#radar {
  position: fixed;
  top: -200px;
  right: -200px;
  width: 500px;
  height: 500px;
  z-index: 0;
  pointer-events: none;
  border-radius: 50%;
  border: 1px solid rgba(0, 212, 255, 0.06);
}
#radar::before {
  content: '';
  position: absolute;
  inset: 20px;
  border-radius: 50%;
  border: 1px solid rgba(0, 212, 255, 0.04);
}
#radar::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 2px;
  height: 50%;
  background: linear-gradient(to bottom, transparent, rgba(0, 212, 255, 0.1));
  transform-origin: top center;
  animation: radar-sweep 8s linear infinite;
  border-radius: 1px;
}

@keyframes radar-sweep {
  from { transform: translate(-50%, 0) rotate(0deg); }
  to { transform: translate(-50%, 0) rotate(360deg); }
}

#arc-reactor {
  position: fixed;
  bottom: 80px;
  left: 40px;
  width: 120px;
  height: 120px;
  z-index: 0;
  pointer-events: none;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0, 212, 255, 0.04) 0%, transparent 70%);
  border: 1px solid rgba(0, 212, 255, 0.08);
}
#arc-reactor::before {
  content: '';
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0, 212, 255, 0.06) 0%, transparent 60%);
  border: 1px solid rgba(0, 212, 255, 0.05);
  animation: pulse-ring 3s ease-in-out infinite;
}
#arc-reactor::after {
  content: '';
  position: absolute;
  inset: 25px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 179, 71, 0.08) 0%, transparent 50%);
  animation: pulse-ring 3s ease-in-out infinite 0.5s;
}

@keyframes pulse-ring {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.15); opacity: 1; }
}

#toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 24px;
  background: rgba(10, 14, 23, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-card);
}

#toolbar::before {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
}

#toolbar .brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

#toolbar .brand-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--cyan);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
#toolbar .brand-icon::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan);
  animation: pulse-dot 1.5s ease-in-out infinite;
}
#toolbar .brand-icon::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid rgba(0, 212, 255, 0.15);
}

#toolbar h1 {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: #b0c8f0;
  text-transform: uppercase;
  letter-spacing: 3px;
}
#toolbar h1 span { color: var(--cyan); }

#toolbar .divider {
  width: 1px;
  height: 20px;
  background: linear-gradient(to bottom, transparent, var(--cyan-dim), transparent);
}

#toolbar .system-info {
  font-family: var(--font-display);
  font-size: 9px;
  color: var(--text-secondary);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

#toolbar .spacer { flex: 1; }

#toolbar .live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

#toolbar .status {
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
#toolbar .status.connected { color: var(--green); }
#toolbar .status.error { color: var(--coral); }
#toolbar .status.connecting { color: var(--amber); }

#toolbar .source-count {
  font-family: var(--font-display);
  font-size: 9px;
  color: var(--text-secondary);
  letter-spacing: 1px;
}
#toolbar .source-count strong { color: var(--cyan); }

#toolbar button {
  background: transparent;
  border: 1px solid var(--border-card);
  color: var(--text-secondary);
  padding: 4px 14px;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.2s ease-out;
  border-radius: 0;
}
#toolbar button:hover {
  border-color: var(--cyan-dim);
  color: var(--cyan);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
}

#category-filters {
  position: relative;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 8px 24px 0;
  max-width: 1920px;
  margin: 0 auto;
}

#category-filters button {
  padding: 3px 12px;
  border: 1px solid var(--border-card);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-display);
  font-size: 8px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease-out;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-radius: 0;
}
#category-filters button::before {
  content: '[ ';
  opacity: 0;
  transition: opacity 0.2s;
}
#category-filters button::after {
  content: ' ]';
  opacity: 0;
  transition: opacity 0.2s;
}
#category-filters button:hover {
  border-color: rgba(0, 212, 255, 0.2);
  color: var(--cyan);
}
#category-filters button:hover::before,
#category-filters button:hover::after {
  opacity: 0.5;
}
#category-filters button.active {
  border-color: var(--cyan-dim);
  color: var(--cyan);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.05);
}
#category-filters button.active::before,
#category-filters button.active::after {
  opacity: 0.6;
}

#widget-container {
  position: relative;
  z-index: 10;
  column-width: 380px;
  column-gap: 12px;
  padding: 10px 24px 60px;
  max-width: 1920px;
  margin: 0 auto;
}

@keyframes card-enter {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes flash {
  0% { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); }
  100% { border-color: var(--border-card); box-shadow: none; }
}

.widget {
  display: inline-block;
  width: 100%;
  margin-bottom: 12px;
  break-inside: avoid;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  overflow: hidden;
  animation: card-enter 0.4s ease-out both;
  transition: all 0.25s ease-out;
  position: relative;
}

.widget::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.widget:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-card-hover);
}
.widget:hover::before { opacity: 1; }

.widget.flash { animation: card-enter 0.4s ease-out, flash 0.6s ease-out; }

.widget-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 14px 6px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.06);
  position: relative;
}

.widget-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 14px;
  right: 14px;
  height: 1px;
  background: linear-gradient(90deg, var(--cyan-dim), transparent);
}

.widget-header h2 {
  font-family: var(--font-display);
  font-size: 9px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.widget-header .time {
  font-family: var(--font-display);
  font-size: 8px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.widget-body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  padding: 6px 14px 10px;
  max-height: 360px;
  overflow-y: auto;
  font-weight: 500;
}

.widget-body .error {
  color: var(--coral);
  font-size: 11px;
  padding: 8px 0;
  font-family: var(--font-display);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.widget-item {
  padding: 5px 0;
  border-bottom: 1px solid rgba(0, 212, 255, 0.04);
}

.widget-item:last-child { border-bottom: none; }

.widget-item .title {
  color: var(--text-primary);
  font-weight: 600;
  font-size: 14px;
}

.widget-item .title a {
  color: var(--text-primary);
  text-decoration: none;
  transition: color 0.15s;
}
.widget-item .title a:hover { color: var(--cyan); }

.widget-item .meta {
  color: var(--text-secondary);
  font-size: 12px;
  margin-top: 1px;
}

.widget-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.stat-card {
  background: rgba(0, 212, 255, 0.03);
  border: 1px solid rgba(0, 212, 255, 0.08);
  padding: 8px 6px;
  text-align: center;
  position: relative;
}

.stat-card .val {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 1px;
}

.stat-card .lbl {
  font-family: var(--font-display);
  font-size: 7px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.big-stat {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
}

.big-stat .num {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
}

.big-stat .num.green { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.2); }
.big-stat .num.amber { color: var(--amber); text-shadow: 0 0 20px rgba(255,179,71,0.2); }
.big-stat .num.coral { color: var(--coral); text-shadow: 0 0 20px rgba(255,68,102,0.2); }
.big-stat .num.cyan { color: var(--cyan); text-shadow: 0 0 20px rgba(0,212,255,0.2); }

.big-stat .label {
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.big-stat .sublabel {
  margin-left: auto;
  color: var(--text-muted);
  font-family: var(--font-display);
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.widget-header h2 .hack-icon {
  display: inline-block;
  width: 16px;
  text-align: center;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.15); }
::-webkit-scrollbar-thumb:hover { background: rgba(0, 212, 255, 0.3); }

@media (max-width: 780px) {
  #widget-container { column-width: 100%; padding: 8px 10px 30px; }
  #category-filters { padding: 6px 10px 0; }
  #toolbar { padding: 8px 10px; gap: 6px; }
  #toolbar h1 { font-size: 10px; }
  #toolbar .source-count { display: none; }
  #toolbar .system-info { display: none; }
  #arc-reactor { display: none; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="scanlines"></div>
<div id="radar"></div>
<div id="arc-reactor"></div>

<div id="toolbar">
  <div class="brand">
    <div class="brand-icon"></div>
    <h1>World<span>Dashboard</span></h1>
  </div>
  <div class="divider"></div>
  <span class="system-info">SYS // ONLINE</span>
  <div class="divider"></div>
  <div class="live-dot"></div>
  <span id="status" class="status connecting">CONNECTING</span>
  <div class="spacer"></div>
  <span class="source-count" id="sourceCount"><strong>0</strong> SOURCES</span>
  <button onclick="toggleAll()" id="collapseBtn">[ COLLAPSE ]</button>
</div>

<div id="category-filters"></div>
<div id="widget-container"></div>

<script>
const CATEGORY_ORDER = ['news','weather','finance','science','environment','sports','social','government','transport','health','calendar']
const CAT_LABELS = {news:'News',weather:'Weather',finance:'Finance',science:'Science',environment:'Environment',sports:'Sports',social:'Social',government:'Government',transport:'Transport',health:'Health',calendar:'Calendar'}
const CAT_COLORS = {news:'#00d4ff',weather:'#ffb347',finance:'#00ff88',science:'#7c5cff',environment:'#00d4ff',sports:'#ff4466',social:'#ffb347',government:'#00ff88',transport:'#7c5cff',health:'#ff4466',calendar:'#ffb347'}

function esc(s) {
  if (s === null || s === undefined) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}

let data = {}
let ws = null
let collapsed = false
let filterCat = null

const container = document.getElementById('widget-container')
const statusEl = document.getElementById('status')
const filterBar = document.getElementById('category-filters')
const sourceCount = document.getElementById('sourceCount')

function setStatus(text, cls) {
  statusEl.textContent = text
  statusEl.className = 'status' + (cls ? ' ' + cls : '')
}

function stars() {
  const c = document.getElementById('bg-canvas')
  const ctx = c.getContext('2d')
  c.width = window.innerWidth
  c.height = window.innerHeight
  const stars = []
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      r: Math.random() * 1.0 + 0.2,
      a: Math.random() * 0.5 + 0.05,
      s: Math.random() * 0.003 + 0.001,
    })
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height)
    for (const st of stars) {
      st.a += Math.sin(Date.now() * st.s) * 0.002
      st.a = Math.max(0.02, Math.min(0.5, st.a))
      ctx.beginPath()
      ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(0, 212, 255, ${st.a})`
      ctx.fill()
    }
    requestAnimationFrame(draw)
  }
  draw()
  window.addEventListener('resize', () => {
    c.width = window.innerWidth
    c.height = window.innerHeight
    for (const st of stars) {
      st.x = Math.random() * c.width
      st.y = Math.random() * c.height
    }
  })
}

stars()

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  ws = new WebSocket(`${proto}//${location.host}/ws`)
  ws.onopen = () => setStatus('ONLINE', 'connected')
  ws.onclose = () => { setStatus('OFFLINE', 'error'); setTimeout(connectWS, 3000) }
  ws.onmessage = e => {
    const msg = JSON.parse(e.data)
    if (msg.type === 'update') {
      data = msg.data
      buildFilters()
      renderAll()
    } else if (msg.type === 'source_update') {
      data[msg.key] = msg.data
      renderOne(msg.key, msg.data)
    } else if (msg.type === 'heartbeat') {
      updateAllTimestamps()
    }
  }
}

function buildFilters() {
  const cats = new Set()
  for (const r of Object.values(data)) cats.add(r.category)
  sourceCount.innerHTML = '<strong>' + Object.keys(data).length + '</strong> SOURCES'
  let html = '<button class="' + (!filterCat ? 'active' : '') + '" onclick="setFilter(null)">ALL SYSTEMS</button>'
  for (const c of CATEGORY_ORDER) {
    if (!cats.has(c)) continue
    html += '<button class="' + (filterCat === c ? 'active' : '') + '" onclick="setFilter(\'' + c + '\')">' + CAT_LABELS[c].toUpperCase() + '</button>'
  }
  filterBar.innerHTML = html
}

function setFilter(cat) {
  filterCat = cat
  buildFilters()
  renderAll()
}

function wmoIcon(code) {
  if (!code && code !== 0) return '?'
  const n = Number(code)
  if (n === 0) return '\u2600'
  if (n <= 3) return '\u26C5'
  if (n <= 48) return '\uD83C\uDF2B\uFE0F'
  if (n <= 57) return '\uD83C\uDF27\uFE0F'
  if (n <= 67) return '\uD83C\uDF27\uFE0F'
  if (n <= 77) return '\uD83C\uDF28\uFE0F'
  if (n <= 82) return '\uD83C\uDF27\uFE0F'
  return '\u26C8\uFE0F'
}

function renderWeather(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO WEATHER DATA</div>'
  return d.map(c => `<div class="widget-item"><div class="title"><span style="font-size:15px;margin-right:4px">${wmoIcon(c.weather_code)}</span> ${esc(c.city)} <strong style="font-size:16px;font-weight:700;color:var(--cyan)">${esc(c.temp ?? '?')}\u00B0</strong></div><div class="meta">FEELS ${esc(c.feels_like ?? '?')}\u00B0  \uD83D\uDCA7 ${esc(c.humidity ?? '?')}%  \uD83D\uDCA8 ${esc(c.wind_speed ?? '?')} KM/H${c.precipitation ? '  \uD83C\uDF27 ' + esc(c.precipitation) + 'MM' : ''}</div></div>`).join('')
}

function renderAirQuality(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO AIR QUALITY DATA</div>'
  return d.map(c => `<div class="widget-item"><div class="title">${esc(c.city)}</div><div class="meta">EU AQI: ${esc(c.european_aqi ?? '?')}  US AQI: ${esc(c.us_aqi ?? '?')}  PM2.5: ${esc(c.pm2_5 ?? '?')}</div></div>`).join('')
}

function renderEarthquakes(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO RECENT SEISMIC ACTIVITY</div>'
  return d.map(e => {
    const magColor = e.magnitude >= 6 ? 'var(--coral)' : e.magnitude >= 5 ? 'var(--amber)' : 'var(--cyan)'
    return `<div class="widget-item"><div class="title"><span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:11px;margin-right:6px;color:${magColor};border:1.5px solid ${magColor};font-family:var(--font-display)">${esc(e.magnitude?.toFixed(1))}</span>${esc(e.place)}</div><div class="meta">${esc(e.depth?.toFixed(1))}KM DEPTH  ${new Date(e.time).toLocaleString()}${e.tsunami ? '  \u26A0\uFE0F TSUNAMI THREAT' : ''}</div></div>`
  }).join('')
}

function renderCrypto(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO MARKET DATA</div>'
  return d.map(c => `<div class="widget-item"><div class="title"><span style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--cyan)">${esc(c.symbol)}</span>  ${esc(c.name)}</div><div class="meta"><span style="color:var(--text-primary)">$${esc(c.price?.toLocaleString())}</span>  <span style="color:${(c.change_24h??0)>=0?'var(--green)':'var(--coral)'}">${(c.change_24h??0) >= 0 ? '+' : ''}${(c.change_24h??0).toFixed(2)}%</span>  MCAP $${(c.market_cap/1e9).toFixed(1)}B</div></div>`).join('')
}

function renderForex(r) {
  const d = r.data
  if (!d) return '<div class="error">NO FOREX DATA</div>'
  return `<div class="widget-grid">${Object.entries(d.rates||{}).map(([k,v]) => `<div class="stat-card"><div class="val">${v.toFixed(4)}</div><div class="lbl">${esc(k)}</div></div>`).join('')}</div>`
}

function renderFearGreed(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO DATA</div>'
  const latest = d[0]
  const v = parseInt(latest.value)
  const cls = v > 60 ? 'green' : v > 40 ? 'amber' : 'coral'
  return `<div class="big-stat"><div class="num ${cls}">${esc(latest.value)}</div><div class="label">${esc(latest.classification)}</div><div class="sublabel">FEAR & GREED INDEX</div></div>`
}

function renderMempool(r) {
  const d = r.data
  if (!d) return '<div class="error">NO MEMPOOL DATA</div>'
  const f = d.fees || {}
  return `<div class="widget-grid"><div class="stat-card"><div class="val">${esc(f.fastestFee ?? '?')}</div><div class="lbl">FAST</div></div><div class="stat-card"><div class="val">${esc(f.halfHourFee ?? '?')}</div><div class="lbl">MED</div></div><div class="stat-card"><div class="val">${esc(f.hourFee ?? '?')}</div><div class="lbl">SLOW</div></div><div class="stat-card"><div class="val">${esc(f.minimumFee ?? '?')}</div><div class="lbl">MIN</div></div></div>`
}

function renderMarine(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO MARINE DATA</div>'
  return d.map(o => `<div class="widget-item"><div class="title" style="color:var(--cyan)">${esc(o.region)}</div><div class="meta">WAVE ${esc(o.wave_height ?? '?')}M  SWELL ${esc(o.swell_height ?? '?')}M  PERIOD ${esc(o.wave_period ?? '?')}S</div></div>`).join('')
}

function renderISS(r) {
  const d = r.data
  if (!d) return '<div class="error">NO TRACKING DATA</div>'
  return `<div class="widget-grid"><div class="stat-card"><div class="val">${Number(d.latitude).toFixed(2)}</div><div class="lbl">LATITUDE</div></div><div class="stat-card"><div class="val">${Number(d.longitude).toFixed(2)}</div><div class="lbl">LONGITUDE</div></div><div class="stat-card"><div class="val" style="color:var(--amber)">${esc(d.astronaut_count ?? 0)}</div><div class="lbl">CREW COUNT</div></div></div>`
}

function renderLaunches(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO UPCOMING LAUNCHES</div>'
  return d.map(l => `<div class="widget-item"><div class="title"><span style="margin-right:4px">\uD83D\uDE80</span> ${esc(l.name)}</div><div class="meta">${esc(l.provider ?? '')}  ${esc(l.rocket ?? '')}${l.net ? '  ' + new Date(l.net).toLocaleDateString() : ''}</div></div>`).join('')
}

function renderNASA(r) {
  const d = r.data
  if (!d) return '<div class="error">NO IMAGE DATA</div>'
  const img = d.image || d.url || ''
  const imgHtml = img ? `<div style="margin:6px 0 8px;border:1px solid rgba(0,212,255,0.08);position:relative"><a href="${esc(d.page_url || d.url || '#')}" target="_blank"><img src="${esc(img)}" style="width:100%;display:block" loading="lazy"></a></div>` : ''
  return `<div class="widget-item">${imgHtml}<div class="title" style="font-weight:600;font-size:13px">${esc(d.title)}</div><div class="meta">${d.page_url ? '<a href="'+esc(d.page_url)+'" target="_blank" style="color:var(--cyan);text-decoration:none;font-family:var(--font-display);font-size:8px;letter-spacing:1px;text-transform:uppercase">VIEW ON APOD</a>' : ''}</div></div>`
}

function renderOnThisDay(r) {
  const d = r.data
  if (!d) return '<div class="error">NO DATA</div>'
  let html = ''
  if (d.events && d.events.length) html += '<div style="margin-top:3px"><span style="color:var(--cyan);font-family:var(--font-display);font-size:8px;letter-spacing:1.5px;text-transform:uppercase">\u25B6 EVENTS</span><div style="margin-top:2px">' + d.events.slice(0,3).map(e => esc(e.text)).join('<br>') + '</div></div>'
  if (d.births && d.births.length) html += '<div style="margin-top:6px"><span style="color:var(--green);font-family:var(--font-display);font-size:8px;letter-spacing:1.5px;text-transform:uppercase">\u25B6 BORN</span><div style="margin-top:2px">' + d.births.slice(0,3).map(e => esc(e.text) + ' (' + esc(e.year) + ')').join('<br>') + '</div></div>'
  if (d.deaths && d.deaths.length) html += '<div style="margin-top:6px"><span style="color:var(--coral);font-family:var(--font-display);font-size:8px;letter-spacing:1.5px;text-transform:uppercase">\u25B6 DIED</span><div style="margin-top:2px">' + d.deaths.slice(0,3).map(e => esc(e.text) + ' (' + esc(e.year) + ')').join('<br>') + '</div></div>'
  return html || '<div class="error">NO DATA</div>'
}

function renderarXiv(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO PAPERS</div>'
  return d.map(p => `<div class="widget-item"><div class="title" style="font-size:13px">${esc(p.title)}</div></div>`).join('')
}

function renderSports(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO GAMES SCHEDULED</div>'
  return d.map(g => `<div class="widget-item"><div class="title">${esc(g.visitor)} <span style="color:var(--text-muted)">@</span> ${esc(g.home)}</div><div class="meta">${esc(g.visitor_score ?? '?')} - ${esc(g.home_score ?? '?')}  ${esc(g.status)}${g.date ? '  ' + new Date(g.date).toLocaleDateString() : ''}</div></div>`).join('')
}

function renderFlights(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO FLIGHTS IN RANGE</div>'
  return d.map(f => `<div class="widget-item"><div class="title"><span style="color:var(--cyan);font-weight:700;font-family:var(--font-display);font-size:13px">${esc(f.callsign || 'N/A')}</span> <span style="color:var(--text-muted)">${esc(f.country)}</span></div><div class="meta">ALT ${esc(f.altitude ?? '?')}FT  ${esc(f.velocity ?? '?')}M/S  ${esc(f.heading ?? '?')}\u00B0</div></div>`).join('')
}

function renderHealth(r) {
  const d = r.data
  if (!d) return '<div class="error">NO HEALTH DATA</div>'
  if (Array.isArray(d)) {
    return d.map(c => `<div class="widget-item"><div class="title">${esc(c.continent)}</div><div class="meta">${esc((c.cases/1e6).toFixed(1))}M CASES  ${esc((c.deaths/1e3).toFixed(0))}K DEATHS  +${esc(c.todayCases)} TODAY</div></div>`).join('')
  }
  return `<div class="widget-grid"><div class="stat-card"><div class="val" style="color:var(--coral)">${esc((d.total_cases/1e6).toFixed(1))}M</div><div class="lbl">TOTAL CASES</div></div><div class="stat-card"><div class="val" style="color:var(--coral)">${esc((d.total_deaths/1e3).toFixed(0))}K</div><div class="lbl">DEATHS</div></div><div class="stat-card"><div class="val" style="color:var(--cyan)">${esc(d.affected_countries)}</div><div class="lbl">COUNTRIES</div></div></div>`
}

function renderF1(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO RACES</div>'
  return d.map(g => `<div class="widget-item"><div class="title"><span style="font-weight:700;color:var(--coral);font-family:var(--font-display);font-size:12px">${esc(g.meeting_name)}</span></div><div class="meta">${esc(g.circuit_short_name)}  ${esc(g.country_name)}${g.date_start ? '  ' + new Date(g.date_start).toLocaleDateString() : ''}</div></div>`).join('')
}

function renderGitHub(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO TRENDING REPOS</div>'
  return d.map(repo => `<div class="widget-item"><div class="title">${repo.url ? `<a href="${esc(repo.url)}" target="_blank" style="color:var(--text-primary);text-decoration:none">${esc(repo.name)}</a>` : esc(repo.name)}</div><div class="meta"><span style="color:var(--amber);font-family:var(--font-display);font-size:10px">\u2605 ${repo.today_stars} TODAY</span>  ${repo.stars} TOTAL  ${repo.description ? '  ' + esc(repo.description.slice(0,100)) : ''}</div></div>`).join('')
}

function renderAurora(r) {
  const d = r.data
  if (!d) return '<div class="error">NO AURORA DATA</div>'
  const kp = d.kp_index
  const kpColor = kp > 6 ? 'var(--coral)' : kp > 4 ? 'var(--amber)' : kp > 2 ? 'var(--green)' : 'var(--text-muted)'
  const label = kp > 6 ? 'GEOMAGNETIC STORM' : kp > 4 ? 'ACTIVE' : kp > 2 ? 'QUIET' : 'LOW'
  return `<div class="big-stat"><div class="num" style="color:${kpColor};text-shadow:0 0 20px ${kpColor.replace('var(','').replace(')','').trim()}">${kp != null ? kp.toFixed(1) : '?'}</div><div class="label">${label}</div><div class="sublabel">K-INDEX</div></div>`
}

function renderUSDebt(r) {
  const d = r.data
  if (!d) return '<div class="error">NO TREASURY DATA</div>'
  const t = d.total_debt / 1e12
  return `<div class="big-stat"><div class="num" style="color:var(--coral);text-shadow:0 0 20px rgba(255,68,102,0.2)">$${esc(t.toFixed(2))}T</div><div class="sublabel">AS OF ${esc(d.record_date || '?')}</div></div>`
}

function renderFeatured(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO FEATURED CONTENT</div>'
  return d.map(item => `<div class="widget-item"><div class="title" style="font-weight:500;font-size:13px">${item.type === 'featured_article' ? '\u25B6 ' : item.type === 'most_read' ? '\u25B6 ' : '\u25B6 '}${esc(item.title)}</div><div class="meta">${item.description ? esc(item.description.slice(0,120)) : ''}${item.views ? '  ' + esc(item.views.toLocaleString()) + ' VIEWS' : ''}</div></div>`).join('')
}

function renderGeneric(r) {
  const d = r.data
  if (!d) return '<div class="error">NO DATA</div>'
  if (Array.isArray(d)) {
    if (!d.length) return '<div class="error">EMPTY</div>'
    return d.map(item => {
      const titleRaw = esc(item.title || item.name || item.text || JSON.stringify(item).slice(0,120))
      const title = item.url ? `<a href="${esc(item.url)}" target="_blank" style="color:var(--text-primary);text-decoration:none">${titleRaw}</a>` : titleRaw
      const metaParts = []
      if (item.score !== undefined) metaParts.push('SCORE: ' + esc(item.score))
      if (item.votes !== undefined) metaParts.push('\uD83D\uDC4D ' + esc(item.votes))
      if (item.comments !== undefined) metaParts.push('\uD83D\uDCAC ' + esc(item.comments))
      if (item.population !== undefined) metaParts.push('POP: ' + esc((item.population/1e6).toFixed(0)) + 'M')
      if (item.country !== undefined) metaParts.push(esc(item.country))
      if (item.date !== undefined) metaParts.push(esc(item.date))
      if (item.countryCode !== undefined) metaParts.push(esc(item.countryCode))
      if (item.continent) metaParts.push(esc(item.continent))
      const meta = metaParts.length ? `<div class="meta">${metaParts.join('  ')}</div>` : ''
      return `<div class="widget-item"><div class="title">${title}</div>${meta}</div>`
    }).join('')
  }
  if (typeof d === 'object') {
    return Object.entries(d).slice(0,8).map(([k,v]) => {
      const val = typeof v === 'object' ? JSON.stringify(v).slice(0,80) : v
      return `<div class="widget-item"><div class="title" style="text-transform:capitalize;font-weight:500;font-size:13px">${esc(k.replace(/_/g,' '))}</div><div class="meta">${esc(val)}</div></div>`
    }).join('')
  }
  return `<div>${esc(String(d).slice(0,200))}</div>`
}

function renderCountries(r) {
  const d = r.data || []
  if (!d.length) return '<div class="error">NO COUNTRY DATA</div>'
  return d.map(c => `<div class="widget-item"><div class="title">${c.flag ? '<img src="'+esc(c.flag)+'" style="width:18px;height:12px;vertical-align:middle;margin-right:6px">' : ''} ${esc(c.name)}</div><div class="meta">${esc(c.capital) || '?'}  ${esc(c.currency) || '?'}</div></div>`).join('')
}

function ago(ts) {
  if (!ts) return ''
  const s = Math.floor((Date.now() / 1000 - ts))
  if (s < 5) return 'NOW'
  if (s < 60) return s + 'S'
  if (s < 3600) return Math.floor(s / 60) + 'M'
  return Math.floor(s / 3600) + 'H'
}

function renderWidget(r) {
  if (r.error) return `<div class="error">ERR: ${esc(r.error)}</div>`
  const renderers = {
    'weather/openmeteo': renderWeather,
    'weather/airquality': renderAirQuality,
    'weather/usgs_earthquake': renderEarthquakes,
    'finance/coingecko': renderCrypto,
    'finance/frankfurter': renderForex,
    'finance/fear_greed': renderFearGreed,
    'finance/mempool': renderMempool,
    'environment/marine_weather': renderMarine,
    'environment/aurora': renderAurora,
    'government/usdebt': renderUSDebt,
    'science/wikifeatured': renderFeatured,
    'social/github': renderGitHub,
    'science/iss': renderISS,
    'science/launchlibrary': renderLaunches,
    'science/nasa_apod': renderNASA,
    'science/arxiv': renderarXiv,
    'science/wikimedia_otd': renderOnThisDay,
    'news/wikimedia': renderOnThisDay,
    'sports/openf1': renderF1,
    'sports': renderSports,
    'transport/opensky': renderFlights,
    'health': renderHealth,
    'government/restcountries': renderCountries,
    'weather': renderWeather,
  }
  const key = `${r.category}/${r.source}`
  const fn = renderers[key] || renderers[r.category] || renderGeneric
  return fn(r)
}

function renderOne(key, r) {
  let el = container.querySelector(`[data-key="${key}"]`)
  const cat = r.category || ''
  const body = renderWidget(r)
  const ts = r.updated_at ? ago(r.updated_at) : ''
  const html = `<div class="widget-header"><h2>\u25B6 ${r.label || key}</h2><span class="time" data-ts="${r.updated_at || ''}">${ts}</span></div><div class="widget-body">${body}</div>`

  if (el) {
    el.style.display = collapsed || (filterCat && filterCat !== cat) ? 'none' : ''
    el.innerHTML = html
    el.classList.remove('flash')
    void el.offsetWidth
    el.classList.add('flash')
  } else {
    const wrapper = document.createElement('div')
    wrapper.className = 'widget flash'
    wrapper.dataset.key = key
    wrapper.dataset.cat = cat
    wrapper.style.display = collapsed || (filterCat && filterCat !== cat) ? 'none' : ''
    wrapper.innerHTML = r.error && !r.data ? `<div class="widget-header"><h2>\u25B6 ${r.label || key}</h2><span class="time" data-ts="${r.updated_at || ''}">${ts}</span></div><div class="widget-body"><div class="error">ERR: ${r.error}</div></div>` : html
    container.appendChild(wrapper)
  }
}

function renderAll() {
  const entries = Object.entries(data).filter(([, r]) => !filterCat || r.category === filterCat)
  entries.sort((a, b) => {
    const aCat = CATEGORY_ORDER.indexOf(a[1].category)
    const bCat = CATEGORY_ORDER.indexOf(b[1].category)
    return (aCat === -1 ? 999 : aCat) - (bCat === -1 ? 999 : bCat)
  })

  container.innerHTML = entries.map(([key, r], i) => {
    const cat = r.category || ''
    const ts = r.updated_at ? ago(r.updated_at) : ''
    const delay = Math.min(i * 25, 250)
    return `<div class="widget" data-key="${key}" data-cat="${cat}" style="${collapsed ? 'display:none' : ''};animation-delay:${delay}ms">
      <div class="widget-header"><h2>\u25B6 ${r.label || key}</h2><span class="time" data-ts="${r.updated_at || ''}">${ts}</span></div>
      <div class="widget-body">${renderWidget(r)}</div>
    </div>`
  }).join('')
}

function updateAllTimestamps() {
  document.querySelectorAll('.widget-header .time[data-ts]').forEach(el => {
    const ts = parseFloat(el.dataset.ts)
    if (ts) el.textContent = ago(ts)
  })
}

function toggleAll() {
  collapsed = !collapsed
  document.getElementById('collapseBtn').textContent = collapsed ? '[ EXPAND ]' : '[ COLLAPSE ]'
  container.querySelectorAll('.widget').forEach(el => {
    el.style.display = collapsed ? 'none' : ''
  })
}

connectWS()
setInterval(updateAllTimestamps, 10000)
</script>
</body>
</html>
